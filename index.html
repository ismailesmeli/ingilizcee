<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Kelime Adaları — İngilizce Öğren</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg-deep: #0A2E33;
            --bg-mid: #0F3D42;
            --surface: #123F45;
            --surface-2: #175059;
            --line: rgba(255, 255, 255, 0.08);
            --coral: #FF7A59;
            --coral-dark: #E5623F;
            --sun: #FFC857;
            --aqua: #6FE7DD;
            --aqua-dark: #37B8AE;
            --success: #4ADE80;
            --success-dark: #2FAE63;
            --error: #FF6B6B;
            --text: #F4FBF8;
            --text-dim: #9FC7C4;
            --text-dimmer: #6E9C99;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            --radius-lg: 26px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }
        
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            margin: 0;
            padding: 0;
        }
        
        body {
            background: radial-gradient(ellipse 900px 500px at 15% -10%, rgba(111, 231, 221, 0.10), transparent 60%), radial-gradient(ellipse 700px 500px at 90% 10%, rgba(255, 122, 89, 0.08), transparent 60%), var(--bg-deep);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        h1,
        h2,
        h3,
        .display {
            font-family: 'Baloo 2', sans-serif;
        }
        
        button {
            font-family: inherit;
            cursor: pointer;
        }
        
         ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
         ::-webkit-scrollbar-thumb {
            background: var(--surface-2);
            border-radius: 8px;
        }
        
        #app {
            max-width: 640px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 40px;
        }
        /* ---------- HEADER ---------- */
        
        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: linear-gradient(180deg, rgba(10, 46, 51, 0.98), rgba(10, 46, 51, 0.9));
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--line);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-badge {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--aqua), var(--aqua-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow);
        }
        
        .brand-text {
            font-family: 'Baloo 2';
            font-weight: 700;
            font-size: 19px;
            letter-spacing: 0.2px;
        }
        
        .brand-text span {
            color: var(--sun);
        }
        
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 7px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
        }
        /* ---------- MAP SCREEN ---------- */
        
        .map-hero {
            padding: 20px 20px 4px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }
        
        .map-hero h2 {
            margin: 0 0 4px;
            font-size: 23px;
        }
        
        .map-hero p {
            margin: 0;
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.5;
            max-width: 400px;
        }
        
        .compass {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        
        .compass-spin {
            animation: compassSpin 30s linear infinite;
            transform-origin: 50% 50%;
        }
        
        @keyframes compassSpin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        .map-wrap {
            position: relative;
            padding: 8px 0 10px;
        }
        
        .map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .map-track {
            position: relative;
            padding: 10px 0 20px;
        }
        /* region banner — hand-drawn ribbon look, tells you which chapter of the archipelago you're in */
        
        .region-banner {
            position: relative;
            margin: 0 20px 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            background: linear-gradient(160deg, var(--surface-2), var(--surface));
            border: 1px solid var(--line);
            border-radius: 14px;
            transform: rotate(-0.6deg);
            box-shadow: var(--shadow);
        }
        
        .region-banner:nth-of-type(even) {
            transform: rotate(0.6deg);
        }
        
        .region-banner .rb-icon {
            font-size: 20px;
        }
        
        .region-banner .rb-text {
            font-family: 'Baloo 2';
            font-weight: 700;
            font-size: 14.5px;
        }
        
        .region-banner .rb-sub {
            font-size: 11.5px;
            color: var(--text-dim);
            font-weight: 600;
        }
        
        .island-cluster {
            position: relative;
        }
        
        .level-node {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 74px;
            height: 74px;
            /* organic island blob instead of a plain circle */
            border-radius: 42% 58% 65% 35% / 45% 40% 60% 55%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            font-family: 'Baloo 2';
            transition: transform .15s ease;
            z-index: 5;
        }
        
        .level-node:nth-child(3n+1) {
            border-radius: 58% 42% 38% 62% / 55% 60% 40% 45%;
        }
        
        .level-node:nth-child(3n+2) {
            border-radius: 48% 52% 62% 38% / 38% 55% 45% 62%;
        }
        
        .level-node:active {
            transform: translate(-50%, -50%) scale(0.93);
        }
        
        .level-node .lvl-num {
            font-size: 21px;
            font-weight: 700;
            line-height: 1;
        }
        
        .level-node .lvl-stars {
            font-size: 10px;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        
        .level-node.locked {
            background: var(--surface);
            border: 3px solid var(--line);
            color: var(--text-dimmer);
        }
        
        .level-node.unlocked {
            background: linear-gradient(160deg, var(--aqua), var(--aqua-dark));
            color: #04302C;
            box-shadow: 0 0 0 5px rgba(111, 231, 221, 0.15), var(--shadow);
        }
        
        .level-node.completed {
            background: linear-gradient(160deg, var(--sun), #E5A83B);
            color: #3A2600;
            box-shadow: 0 0 0 5px rgba(255, 200, 87, 0.18), var(--shadow);
        }
        
        .level-node .lock-ic {
            font-size: 20px;
        }
        
        .level-node .palm {
            position: absolute;
            top: -11px;
            font-size: 16px;
        }
        
        .boat-marker {
            position: absolute;
            font-size: 28px;
            transform: translate(-50%, -130%);
            transition: top .5s ease, left .5s ease;
            z-index: 6;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
            animation: bob 2.4s ease-in-out infinite;
        }
        
        @keyframes bob {
            0%,
            100% {
                transform: translate(-50%, -130%) rotate(-4deg);
            }
            50% {
                transform: translate(-50%, -138%) rotate(4deg);
            }
        }
        /* soft wavy divider used between the finished A1 archipelago and the fog of future regions */
        
        .wave-divider {
            width: 100%;
            height: 34px;
            opacity: 0.5;
            margin: 10px 0;
        }
        /* ---------- FUTURE REGIONS TEASER (roadmap preview) ---------- */
        
        .future-regions {
            margin: 10px 20px 30px;
            padding: 18px 18px 20px;
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
            border: 1px dashed var(--line);
        }
        
        .future-regions h3 {
            margin: 0 0 4px;
            font-size: 16px;
            font-family: 'Baloo 2';
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .future-regions p {
            margin: 0 0 14px;
            color: var(--text-dim);
            font-size: 13px;
        }
        
        .fog-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .fog-chip {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 16px;
            min-width: 108px;
            filter: grayscale(0.4);
            opacity: 0.75;
        }
        
        .fog-chip .fc-level {
            font-family: 'Baloo 2';
            font-weight: 700;
            font-size: 14px;
            color: var(--text-dimmer);
        }
        
        .fog-chip .fc-count {
            font-size: 11.5px;
            color: var(--text-dimmer);
        }
        /* ---------- OVERLAY / MODAL ---------- */
        
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            animation: fadeIn .2s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .overlay-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }
        
        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--line);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 18px;
        }
        
        .overlay-title {
            font-family: 'Baloo 2';
            font-weight: 700;
            font-size: 18px;
            flex: 1;
        }
        
        .overlay-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            max-width: 640px;
            margin: 0 auto;
            width: 100%;
        }
        /* ---------- FLASHCARDS ---------- */
        
        .flash-progress {
            display: flex;
            gap: 4px;
            margin-bottom: 18px;
        }
        
        .flash-progress i {
            flex: 1;
            height: 5px;
            border-radius: 4px;
            background: var(--surface-2);
        }
        
        .flash-progress i.done {
            background: var(--aqua);
        }
        
        .flashcard {
            background: linear-gradient(160deg, var(--surface-2), var(--surface));
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            perspective: 1000px;
        }
        
        .flashcard .cat-tag {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--aqua);
            background: rgba(111, 231, 221, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        
        .flashcard .word-en {
            font-family: 'Baloo 2';
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .flashcard .word-tr {
            font-size: 20px;
            color: var(--sun);
            font-weight: 800;
            min-height: 28px;
        }
        
        .flashcard .example {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 14px;
            font-style: italic;
            min-height: 20px;
        }
        
        .flashcard .tap-hint {
            font-size: 12.5px;
            color: var(--text-dimmer);
            margin-top: 18px;
        }
        
        .flash-nav {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .flash-nav button {
            flex: 1;
        }
        /* ---------- BUTTONS ---------- */
        
        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 800;
            font-size: 15.5px;
            transition: transform .1s ease, filter .15s ease;
        }
        
        .btn:active {
            transform: scale(0.96);
        }
        
        .btn-primary {
            background: linear-gradient(160deg, var(--coral), var(--coral-dark));
            color: #fff;
            box-shadow: 0 6px 16px rgba(255, 122, 89, 0.28);
        }
        
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--line);
        }
        
        .btn-block {
            width: 100%;
        }
        
        .btn:disabled {
            opacity: 0.4;
        }
        /* ---------- GAME SELECT ---------- */
        
        .game-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            text-align: left;
            width: 100%;
        }
        
        .game-card .g-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        
        .game-card .g-info {
            flex: 1;
        }
        
        .game-card .g-title {
            font-family: 'Baloo 2';
            font-weight: 700;
            font-size: 16.5px;
        }
        
        .game-card .g-desc {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        
        .game-card .g-stars {
            font-size: 14px;
            color: var(--sun);
            margin-top: 5px;
            letter-spacing: 2px;
        }
        
        .game-card .g-arrow {
            font-size: 20px;
            color: var(--text-dimmer);
        }
        /* ---------- QUIZ ---------- */
        
        .quiz-topline {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }
        
        .quiz-bar {
            flex: 1;
            height: 8px;
            background: var(--surface-2);
            border-radius: 6px;
            overflow: hidden;
        }
        
        .quiz-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--aqua), var(--aqua-dark));
            transition: width .3s ease;
        }
        
        .quiz-score {
            font-weight: 800;
            color: var(--sun);
            font-size: 14px;
            white-space: nowrap;
        }
        
        .quiz-question {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 32px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--line);
        }
        
        .quiz-question .qq-label {
            font-size: 12.5px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .quiz-question .qq-word {
            font-family: 'Baloo 2';
            font-size: 30px;
            font-weight: 700;
        }
        
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .quiz-opt {
            background: var(--surface);
            border: 2px solid var(--line);
            border-radius: 16px;
            padding: 16px 10px;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            transition: all .15s ease;
        }
        
        .quiz-opt.correct {
            background: rgba(74, 222, 128, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        
        .quiz-opt.wrong {
            background: rgba(255, 107, 107, 0.15);
            border-color: var(--error);
            color: var(--error);
        }
        
        .quiz-opt.dim {
            opacity: 0.45;
        }
        /* ---------- MATCH GAME ---------- */
        
        .match-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-weight: 800;
            color: var(--text-dim);
            font-size: 13.5px;
        }
        
        .match-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .match-card {
            aspect-ratio: 1/1;
            border-radius: 14px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 13px;
            padding: 6px;
            transition: transform .25s ease, background .2s ease;
            transform-style: preserve-3d;
        }
        
        .match-card.flipped {
            background: var(--aqua-dark);
            color: #04302C;
        }
        
        .match-card.matched {
            background: rgba(74, 222, 128, 0.18);
            border-color: var(--success);
            color: var(--success);
        }
        
        .match-card.hidden-face {
            color: transparent;
            background: linear-gradient(160deg, var(--surface-2), var(--surface));
        }
        
        .match-card .mc-icon {
            font-size: 22px;
        }
        /* ---------- SCRAMBLE ---------- */
        
        .scr-meaning {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 22px 18px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--line);
        }
        
        .scr-meaning .sm-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .scr-meaning .sm-word {
            font-family: 'Baloo 2';
            font-size: 26px;
            font-weight: 700;
            color: var(--sun);
            margin-top: 6px;
        }
        
        .scr-slots {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            min-height: 56px;
        }
        
        .scr-slot {
            width: 42px;
            height: 48px;
            border-radius: 10px;
            border: 2px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Baloo 2';
            font-size: 20px;
            font-weight: 700;
            background: var(--surface);
        }
        
        .scr-slot.filled {
            border-color: var(--aqua);
        }
        
        .scr-slot.correct {
            border-color: var(--success);
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
        }
        
        .scr-slot.wrong {
            border-color: var(--error);
            background: rgba(255, 107, 107, 0.15);
            color: var(--error);
        }
        
        .scr-tiles {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        
        .scr-tile {
            width: 42px;
            height: 48px;
            border-radius: 10px;
            border: none;
            background: var(--surface-2);
            color: var(--text);
            font-family: 'Baloo 2';
            font-size: 20px;
            font-weight: 700;
        }
        
        .scr-tile:active {
            transform: scale(0.9);
        }
        
        .scr-tile.used {
            visibility: hidden;
        }
        
        .scr-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        /* Word Hunt Game */
        
        .wh-arena {
            height: 400px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }
        
        .shake {
            animation: shake .35s ease;
        }
        
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-6px);
            }
            80% {
                transform: translateX(6px);
            }
        }
        /* ---------- RESULT SCREEN ---------- */
        
        .result-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 30px 20px;
        }
        
        .result-stars {
            font-size: 52px;
            letter-spacing: 8px;
            margin-bottom: 6px;
        }
        
        .result-title {
            font-family: 'Baloo 2';
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .result-sub {
            color: var(--text-dim);
            font-size: 15px;
            margin-bottom: 28px;
        }
        
        .result-stat-row {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
        }
        
        .result-stat {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 20px;
            min-width: 100px;
        }
        
        .result-stat .rs-num {
            font-family: 'Baloo 2';
            font-size: 24px;
            font-weight: 700;
            color: var(--sun);
        }
        
        .result-stat .rs-label {
            font-size: 11.5px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        
        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }
        
        .pop {
            animation: pop .4s cubic-bezier(.34, 1.56, .64, 1);
        }
        
        @keyframes pop {
            from {
                transform: scale(0.6);
                opacity: 0;
            }

        const LEVELS = {};
        WORDS.forEach(w => {
            (LEVELS[w.level] = LEVELS[w.level] || []).push(w);
        });
        const LEVEL_NUMS = Object.keys(LEVELS).map(Number).sort((a, b) => a - b);
        const TOTAL_LEVELS = LEVEL_NUMS.length;

        function levelDominantCat(lvl) {
            const counts = {};
            LEVELS[lvl].forEach(w => counts[w.cat] = (counts[w.cat] || 0) + 1);
            let best = null,
                bestC = 0;
            for (const c in counts) {
                if (counts[c] > bestC) {
                    best = c;
                    bestC = counts[c];
                }
            }
            return best;
        }

        /* ---------------- STATE (in-memory only, resets on reload) ---------------- */
        const state = {
            screen: 'map', // map
            overlay: null, // null | level | game-select | quiz | match | scramble | result
            currentLevel: 1,
            progress: {}, // {levelNum:{stars, quiz:{best}, match:{best}, scramble:{best}, hunt:{best}, kp, isUnderSiege, immunityTurns}}
            flashIdx: 0,
            flashFlipped: false,
            lastResult: null,
            quiz: null,
            match: null,
            scramble: null,
            hunt: null, // Word Hunt game state
        };
        LEVEL_NUMS.forEach(n => {
            state.progress[n] = state.progress[n] || {
                stars: 0,
                quiz: null,
                match: null,
                scramble: null,
                hunt: null,
                kp: 0,
                isUnderSiege: false,
                immunityTurns: 0,
            }
        });

        function isUnlocked(lvl) {
            if (lvl === 1) return true;
            return (state.progress[lvl - 1] && state.progress[lvl - 1].stars >= 1);
        }

        function totalStars() {
            return LEVEL_NUMS.reduce((s, n) => s + (state.progress[n].stars || 0), 0);
        }

        function maxStars() {
            // Each level can have up to 4 stars now (Quiz, Match, Scramble, Hunt)
            // But let's stick to 3 as per the main star system, hunt is a bonus
            return TOTAL_LEVELS * 3;
        }

        function furthestUnlocked() {
            let f = 1;
            for (const n of LEVEL_NUMS) {
                if (isUnlocked(n)) f = n;
                else break;
            }
            return f;
        }

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function sample(arr, n) {
            return shuffle(arr).slice(0, n);
        }

        function starsToStr(n) {
            let s = '';
            for (let i = 0; i < 3; i++) s += i < n ? '★' : '☆';
            return s;
        }

        function exampleSentence(w) {
            if (w.cat === 'verbs') return `I like to ${w.en}.`;
            if (w.cat === 'adjectives') return `It is very ${w.en}.`;
            if (w.cat === 'pronouns' || w.cat === 'phrases') return `"${w.en}"`;
            const vowel = /^[aeiouAEIOU]/.test(w.en);
            return `This is ${vowel?'an':'a'} ${w.en}.`;
        }

        /* ---------------- RENDER ---------------- */
        const app = document.getElementById('app');

        function render() {
            app.innerHTML = renderTopbar() + renderMap();
            renderLevelPositions();
            if (state.overlay) renderOverlay();
        }

        function renderTopbar() {
            return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-badge">🗺️</div>
      <div class="brand-text">Kelime <span>Adaları</span></div>
    </div>
    <div class="stat-pill">⭐ ${totalStars()} / ${maxStars()}</div>
  </div>`;
        }

        // deterministic scatter pattern so islands feel hand-placed, not a straight zigzag path
        const SCATTER_X = [24, 68, 44, 78, 32];
        const SCATTER_Y = [0, 16, -10, 20, -6];
        const REGION_SIZE = 5;
        const NODE_STEP = 100;

        function compassRoseSVG() {
            return `
  <svg class="compass" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="27" fill="none" stroke="var(--aqua)" stroke-opacity="0.35" stroke-width="1.5"/>
    <g class="compass-spin">
      <polygon points="30,6 35,30 30,54 25,30" fill="var(--coral)" opacity="0.85"/>
      <polygon points="6,30 30,25 54,30 30,35" fill="var(--aqua)" opacity="0.6"/>
    </g>
    <circle cx="30" cy="30" r="3.2" fill="var(--sun)"/>
  </svg>`;
        }

        function waveDividerSVG() {
            return `
  <svg class="wave-divider" viewBox="0 0 400 34" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,17 C50,0 100,34 150,17 C200,0 250,34 300,17 C330,6 370,6 400,17" fill="none" stroke="var(--aqua)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </svg>`;
        }

        function renderMap() {
            const regions = [];
            for (let i = 0; i < LEVEL_NUMS.length; i += REGION_SIZE) {
                regions.push(LEVEL_NUMS.slice(i, i + REGION_SIZE));
            }

            const fu = furthestUnlocked();
            let boatX = 50,
                boatY = 50;
            let regionsHtml = '';
            let globalIdx = 0;

            regions.forEach((regionLevels, rIdx) => {
                        const regionHeight = (regionLevels.length - 1) * NODE_STEP + 140;
                        const cats = {};
                        regionLevels.forEach(n => {
                            const c = levelDominantCat(n);
                            cats[c] = (cats[c] || 0) + 1;
                        });
                        const topCat = Object.keys(cats).sort((a, b) => cats[b] - cats[a])[0];

                        let nodesHtml = '';
                        let pts = [];
                        regionLevels.forEach((n, i) => {
                                    const x = SCATTER_X[i % SCATTER_X.length];
                                    const y = 60 + i * NODE_STEP + SCATTER_Y[i % SCATTER_Y.length];
                                    pts.push({
                                        x,
                                        y
                                    });
                                    const unlocked = isUnlocked(n);
                                    const stars = state.progress[n].stars;
                                    const completed = stars >= 1;
                                    let cls = 'locked';
                                    if (completed) cls = 'completed';
                                    else if (unlocked) cls = 'unlocked';
                                    nodesHtml += `
      <button class="level-node ${cls} pop" style="left:${x}%; top:${y}px;" data-action="open-level" data-level="${n}" ${unlocked?'':'disabled'}>
        ${(completed && i%2===0) ? '<span class="palm">🌴</span>' : ''}
        ${unlocked ? `<div class="lvl-num">${n}</div><div class="lvl-stars">${completed? starsToStr(stars):''}</div>` : `<div class="lock-ic">🔒</div>`}
      </button>`;
      if(n===fu){ boatX=x; boatY=y; }
      globalIdx++;
    });

    // per-region svg connector (breaks between regions — not one continuous snake)
    let d='';
    pts.forEach((p,i)=>{
      const yPct = p.y/regionHeight*100;
      if(i===0) d += `M ${p.x} ${yPct} `;
      else{
        const prev = pts[i-1];
        const prevYPct = prev.y/regionHeight*100;
        const midY = (prevYPct+yPct)/2;
        d += `C ${prev.x} ${midY}, ${p.x} ${midY}, ${p.x} ${yPct} `;
      }
    });

    regionsHtml += `
    <div class="region-banner">
      <span class="rb-icon">${CAT_ICON[topCat]||'🏝️'}</span>
      <div>
        <div class="rb-text">Bölge ${rIdx+1} · Ada ${regionLevels[0]}–${regionLevels[regionLevels.length-1]}</div>
        <div class="rb-sub">${CAT_NAMES[topCat]||'Karışık'}</div>
      </div>
    </div>
    <div class="island-cluster" style="height:${regionHeight}px;">
      <svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="height:${regionHeight}px;">

    </div>`;

      <div class="fog-chip"><div class="fc-level">B2</div><div class="fc-count">15 bölüm</div></div>
      <div class="fog-chip"><div class="fc-level">C1</div><div class="fc-count">10 bölüm</div></div>

}

/* ---------------- OVERLAY ROUTER ---------------- */
function openOverlay(html){
  let el = document.getElementById('overlayRoot');
  if(!el){
    el = document.createElement('div');
    el.id='overlayRoot';
    el.className='overlay';
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  el.style.display='flex';
}
function closeOverlay(){
  const el = document.getElementById('overlayRoot');
  if(el) el.style.display='none';
  state.overlay=null;
  render();
}
function renderOverlay(){}

/* ---------------- LEVEL DETAIL (flashcards) ---------------- */
function openLevel(lvl){
  state.currentLevel = lvl;
  state.flashIdx = 0; state.flashFlipped=false;
  showFlashcards();
}
function showFlashcards(){
  const words = LEVELS[state.currentLevel];
  const w = words[state.flashIdx];
  const cat = levelDominantCat(state.currentLevel);
  const progressBar = words.map((_,i)=>`<i class="${i<=state.flashIdx?'done':''}"></i>`).join('');
  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">←</button>
      <div class="overlay-title">Seviye ${state.currentLevel} · ${CAT_NAMES[cat]||''}</div>
      <div class="icon-btn" style="pointer-events:none;">${CAT_ICON[cat]||'📘'}</div>
    </div>
    <div class="overlay-body">
      <div class="flash-progress">${progressBar}</div>
      <div class="flashcard pop" data-action="flip-card" id="flashcardEl">
        <div class="cat-tag">${CAT_NAMES[w.cat]||''}</div>
        <div class="word-en">${w.en}</div>
        <div class="word-tr">${state.flashFlipped ? w.tr : ''}</div>
        <div class="example">${state.flashFlipped ? exampleSentence(w) : ''}</div>
        <div class="tap-hint">${state.flashFlipped ? '' : '👆 Anlamını görmek için karta dokun'}</div>
      </div>
      <div class="flash-nav">
        <button class="btn btn-secondary" data-action="flash-prev" ${state.flashIdx===0?'disabled':''}>← Önceki</button>
        <button class="btn btn-primary" data-action="flash-next">${state.flashIdx===words.length-1?'Oyunlara Geç 🎮':'Sonraki →'}</button>
      </div>
    </div>
  `);
}
function flipCard(){ state.flashFlipped = !state.flashFlipped; showFlashcards(); }
function flashPrev(){ if(state.flashIdx>0){ state.flashIdx--; state.flashFlipped=false; showFlashcards(); } }
function flashNext(){
  const words = LEVELS[state.currentLevel];
  if(state.flashIdx < words.length-1){ state.flashIdx++; state.flashFlipped=false; showFlashcards(); }
  else{ showGameSelect(); }
}

/* ---------------- GAME SELECT ---------------- */
function showGameSelect(){
  const lvl = state.currentLevel;
  const p = state.progress[lvl];
  const cat = levelDominantCat(lvl);
  
  // Sequential game unlocking logic
  const gamesUnlocked = {
      quiz: true, // Quiz is always the first game
      match: p.quiz && p.quiz.best > 0,
      scramble: p.match && p.match.best > 0,
      hunt: p.scramble && p.scramble.best > 0,
  };

  const gameInfo = [
    {key:'quiz', title:'1. Yıldız: Quiz', desc:'Doğru anlamı seçerek adayı fethet.', icon:'🧠', color:'linear-gradient(160deg,#6FE7DD,#37B8AE)'},
    {key:'match', title:'2. Yıldız: Eşleştirme', desc:'Kelime çiftlerini eşleştir.', icon:'🃏', color:'linear-gradient(160deg,#FFC857,#E5A83B)'},
    {key:'scramble', title:'3. Yıldız: Karışık Harfler', desc:'Harfleri sırala, kelimeyi bul.', icon:'🔤', color:'linear-gradient(160deg,#FF7A59,#E5623F)'},
    {key:'hunt', title:'Bonus: Kelime Avı', desc:'Süre dolmadan kelimeleri yakala!', icon:'⏱️', color:'linear-gradient(160deg,#A78BFA,#8B5CF6)'},
  ];

  const cards = gameInfo.map(g=>{
    const best = p[g.key];
    const isUnlocked = gamesUnlocked[g.key];
    const isCompleted = best && best.best > 0;

    return `
    <button class="game-card" data-action="start-game" data-game="${g.key}" ${isUnlocked ? '' : 'disabled style="opacity:0.5; filter:grayscale(0.8);"'}>
      <div class="g-icon" style="background:${g.color};">${g.icon}</div>
      <div class="g-info">
        <div class="g-title">${g.title}</div>
        <div class="g-desc">${isUnlocked ? g.desc : 'Önceki oyunu tamamla'}</div>
        <div class="g-stars">${isCompleted ? `En iyi: ${starsToStr(best.best)}` : (isUnlocked ? 'Henüz oynanmadı' : '🔒 Kilitli')}</div>
      </div>
      <div class="g-arrow">${isUnlocked ? '›' : ''}</div>
    </button>`;
  }).join('');

  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">←</button>
      <div class="overlay-title">Seviye ${lvl} Oyunları</div>
      <div class="icon-btn" style="pointer-events:none;">${CAT_ICON[cat]||'🎮'}</div>
    </div>
    <div class="overlay-body">
      <p style="color:var(--text-dim);font-size:14px;margin-top:0;">Yıldızları toplamak ve adayı güçlendirmek için oyunları sırayla tamamla!</p>
      ${cards}
    </div>
  `);
}

/* ---------------- QUIZ GAME ---------------- */
function buildQuiz(lvl){
  const words = LEVELS[lvl];
  const allOtherWords = WORDS.filter(w=>w.level!==lvl);
  const qCount = Math.min(10, words.length);
  const chosen = sample(words, qCount);
  const questions = chosen.map(w=>{
    const dir = Math.random()<0.5 ? 'en2tr' : 'tr2en';
    const correct = dir==='en2tr' ? w.tr : w.en;
    const pool = words.filter(x=>x.en!==w.en).concat(sample(allOtherWords,6));
    const distractorsSrc = sample(pool, 8).map(x=> dir==='en2tr'? x.tr : x.en).filter(v=>v!==correct);
    const uniqueDistractors = [...new Set(distractorsSrc)].slice(0,3);
    while(uniqueDistractors.length<3){
      const r = sample(allOtherWords,1)[0];
      const val = dir==='en2tr'? r.tr : r.en;
      if(val!==correct && !uniqueDistractors.includes(val)) uniqueDistractors.push(val);
    }
    const options = shuffle([correct,...uniqueDistractors]);
    return {word:w, dir, correct, options};
  });
  return {questions, idx:0, score:0, answered:false};
}
function startGame(game){
  if(game==='quiz'){ state.quiz = buildQuiz(state.currentLevel); showQuiz(); }
  if(game==='match'){ state.match = buildMatch(state.currentLevel); showMatch(); }
  if(game==='scramble'){ state.scramble = buildScramble(state.currentLevel); showScramble(); }
  if(game==='hunt'){ state.hunt = buildHunt(state.currentLevel); showHunt(); }
}
function showQuiz(){
  const q = state.quiz;
  const cur = q.questions[q.idx];
  const label = cur.dir==='en2tr' ? "Türkçe anlamı nedir?" : "İngilizcesi nedir?";
  const optsHtml = cur.options.map(opt=>{
    let cls='quiz-opt';
    if(q.answered){
      if(opt===cur.correct) cls+=' correct';
      else if(opt===state.quiz.selected && opt!==cur.correct) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-action="quiz-answer" data-opt="${encodeURIComponent(opt)}" ${q.answered?'disabled':''}>${opt}</button>`;
  }).join('');
  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">✕</button>
      <div class="overlay-title">Quiz · Seviye ${state.currentLevel}</div>
      <div style="width:38px;"></div>
    </div>
    <div class="overlay-body">
      <div class="quiz-topline">
        <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${(q.idx/q.questions.length)*100}%;"></div></div>
        <div class="quiz-score">${q.idx+1}/${q.questions.length}</div>
      </div>
      <div class="quiz-question pop">
        <div class="qq-label">${label}</div>
        <div class="qq-word">${cur.dir==='en2tr' ? cur.word.en : cur.word.tr}</div>
      </div>
      <div class="quiz-options">${optsHtml}</div>
    </div>
  `);
}
function quizAnswer(opt){
  const q = state.quiz;
  if(q.answered) return;
  q.answered = true;
  q.selected = opt;
  if(opt===q.questions[q.idx].correct) q.score++;
  showQuiz();
  setTimeout(()=>{
    if(q.idx < q.questions.length-1){
      q.idx++; q.answered=false; q.selected=null;
      showQuiz();
    } else {
      finishGame('quiz', q.score, q.questions.length);
    }
  }, 900);
}

/* ---------------- MATCH GAME ---------------- */
function buildMatch(lvl){
  const words = LEVELS[lvl];
  const n = Math.min(6, words.length);
  const chosen = sample(words, n);
  let cards = [];
  chosen.forEach((w,i)=>{
    cards.push({id:'en'+i, pairId:i, text:w.en, kind:'en'});
    cards.push({id:'tr'+i, pairId:i, text:w.tr, kind:'tr'});
  });
  cards = shuffle(cards);
  return {cards, flipped:[], matched:[], moves:0, pairs:n, done:0};
}
function showMatch(){
  const m = state.match;
  const cardsHtml = m.cards.map(c=>{
    const isFlipped = m.flipped.includes(c.id);
    const isMatched = m.matched.includes(c.id);
    let cls='match-card';
    if(isMatched) cls+=' matched'; else if(isFlipped) cls+=' flipped'; else cls+=' hidden-face';
    return `<button class="${cls}" data-action="match-flip" data-id="${c.id}" ${isMatched?'disabled':''}>
      ${isMatched||isFlipped ? c.text : '❔'}
    </button>`;
  }).join('');
  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">✕</button>
      <div class="overlay-title">Eşleştirme · Seviye ${state.currentLevel}</div>
      <div style="width:38px;"></div>
    </div>
    <div class="overlay-body">
      <div class="match-stats"><span>👆 Hamle: ${m.moves}</span><span>✅ ${m.done}/${m.pairs}</span></div>
      <div class="match-grid">${cardsHtml}</div>
    </div>
  `);
}
function matchFlip(id){
  const m = state.match;
  if(m.flipped.includes(id) || m.matched.includes(id) || m.flipped.length>=2) return;
  m.flipped.push(id);
  if(m.flipped.length===2){
    m.moves++;
    showMatch();
    const [a,b] = m.flipped.map(fid=>m.cards.find(c=>c.id===fid));
    setTimeout(()=>{
      if(a.pairId===b.pairId){
        m.matched.push(a.id,b.id);
        m.done++;
      }
      m.flipped=[];
      if(m.done===m.pairs){
        finishGame('match', m.done, m.pairs, m.moves);
      } else {
        showMatch();
      }
    }, 700);
  } else {
    showMatch();
  }
}

/* ---------------- SCRAMBLE GAME ---------------- */
function buildScramble(lvl){
  const words = LEVELS[lvl];
  let candidates = words.filter(w=>/^[A-Za-z]+$/.test(w.en) && w.en.length>=3);
  if(candidates.length<6){
    const extra = WORDS.filter(w=>/^[A-Za-z]+$/.test(w.en) && w.en.length>=3 && !candidates.includes(w));
    candidates = candidates.concat(sample(extra, 8-candidates.length));
  }
  const rounds = sample(candidates, Math.min(8,candidates.length)).map(w=>{
    let letters = shuffle(w.en.toUpperCase().split(''));
    // ensure not already in correct order
    if(letters.join('')===w.en.toUpperCase()) letters = shuffle(letters);
    return {word:w, letters, used:letters.map(()=>false), built:[], attempts:0, status:'playing'};
  });
  return {rounds, idx:0, score:0};
}
function showScramble(){
  const s = state.scramble;
  const r = s.rounds[s.idx];
  const slots = r.word.en.toUpperCase().split('').map((_,i)=>{
    const filledIdx = r.built[i];
    let cls='scr-slot';
    if(r.status==='correct') cls+=' correct';
    else if(r.status==='revealed') cls+=' wrong';
    else if(filledIdx!==undefined) cls+=' filled';
    const ch = r.status==='revealed' ? r.word.en.toUpperCase()[i] : (filledIdx!==undefined ? r.letters[filledIdx] : '');
    return `<div class="${cls}">${ch}</div>`;
  }).join('');
  const tiles = r.letters.map((ch,i)=>{
    const used = r.used[i] || r.status!=='playing';
    return `<button class="scr-tile ${used?'used':''}" data-action="scr-tile" data-idx="${i}" ${used||r.status!=='playing'?'disabled':''}>${ch}</button>`;
  }).join('');
  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">✕</button>
      <div class="overlay-title">Karışık Harfler · Seviye ${state.currentLevel}</div>
      <div style="width:38px;"></div>
    </div>
    <div class="overlay-body">
      <div class="quiz-topline">
        <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${(s.idx/s.rounds.length)*100}%;"></div></div>
        <div class="quiz-score">${s.idx+1}/${s.rounds.length}</div>
      </div>
      <div class="scr-meaning pop" id="scrMeaning">
        <div class="sm-label">Bu kelimeyi oluştur</div>
        <div class="sm-word">${r.word.tr}</div>
      </div>
      <div class="scr-slots" id="scrSlots">${slots}</div>
      <div class="scr-tiles">${tiles}</div>
      <div class="scr-controls">
        <button class="btn btn-secondary" data-action="scr-undo">⌫ Geri Al</button>
        <button class="btn btn-secondary" data-action="scr-clear">🔄 Temizle</button>
      </div>
    </div>
  `);
}
function scrTile(i){
  const r = state.scramble.rounds[state.scramble.idx];
  if(r.status!=='playing' || r.used[i]) return;
  r.used[i]=true;
  r.built.push(i);
  if(r.built.length===r.letters.length){
    const attempt = r.built.map(idx=>r.letters[idx]).join('');
    if(attempt===r.word.en.toUpperCase()){
      r.status='correct';
      state.scramble.score++;
      showScramble();
      setTimeout(()=>scrAdvance(), 900);
    } else {
      r.attempts++;
      showScramble();
      const slotsEl = document.getElementById('scrSlots');
      if(slotsEl) slotsEl.classList.add('shake');
      if(r.attempts>=2){
        setTimeout(()=>{ r.status='revealed'; showScramble(); setTimeout(()=>scrAdvance(),1200); }, 500);
      } else {
        setTimeout(()=>{ r.used=r.letters.map(()=>false); r.built=[]; showScramble(); }, 700);
      }
    }
  } else {
    showScramble();
  }
}
function scrUndo(){
  const r = state.scramble.rounds[state.scramble.idx];
  if(r.status!=='playing' || r.built.length===0) return;
  const last = r.built.pop();
  r.used[last]=false;
  showScramble();
}
function scrClear(){
  const r = state.scramble.rounds[state.scramble.idx];
  if(r.status!=='playing') return;
  r.used = r.letters.map(()=>false);
  r.built = [];
  showScramble();
}
function scrAdvance(){
  const s = state.scramble;
  if(s.idx < s.rounds.length-1){ s.idx++; showScramble(); }
  else { finishGame('scramble', s.score, s.rounds.length); }
}

/* ---------------- WORD HUNT GAME ---------------- */
function buildHunt(lvl) {
    const words = LEVELS[lvl];
    const allOtherWords = WORDS.filter(w => w.level !== lvl);
    const gameDuration = 30000; // 30 seconds
    const wordCount = 20;
    const correctWords = sample(words, wordCount);
    const incorrectWords = sample(allOtherWords, wordCount * 2);
    const allGameWords = shuffle(correctWords.map(w => ({...w, isCorrect: true }))
        .concat(incorrectWords.map(w => ({...w, isCorrect: false }))));

    return {
        words: allGameWords,
        score: 0,
        totalCorrect: wordCount,
        startTime: Date.now(),
        duration: gameDuration,
        clicked: new Set(),
    };
}

function showHunt() {
    const h = state.hunt;
    // This is a placeholder for the visual representation.
    // A real implementation would require more complex DOM manipulation for the animation.
    openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">✕</button>
      <div class="overlay-title">Kelime Avı · Seviye ${state.currentLevel}</div>
      <div style="width:38px;"></div>
    </div>
    <div class="overlay-body">
        <div class="quiz-topline">
            <div class="quiz-bar"><div id="hunt-timer" class="quiz-bar-fill" style="width:100%;"></div></div>
            <div class="quiz-score" id="hunt-score">Skor: 0</div>
        </div>
        <div class="wh-arena" id="wh-arena">
            <p style="padding: 20px; text-align:center; color: var(--text-dim);">Bu adadaki kelimeleri süre dolmadan yakala!</p>
        </div>
    </div>
  `);
    // Simplified logic: just finish the game after the duration
    const timerInterval = setInterval(() => {
        const elapsed = Date.now() - h.startTime;
        const remaining = h.duration - elapsed;
        const timerEl = document.getElementById('hunt-timer');
        if (remaining <= 0 && timerEl) {
            clearInterval(timerInterval);
            timerEl.style.width = '0%';
            // Simplified score for demo
            const demoScore = Math.floor(Math.random() * h.totalCorrect);
            finishGame('hunt', demoScore, h.totalCorrect);
        } else if (timerEl) {
            timerEl.style.width = `${(remaining / h.duration) * 100}%`;
        }
    }, 100);
}

/* ---------------- RESULT / FINISH ---------------- */
function finishGame(game, correct, total, extra){
  const pct = total>0 ? correct/total : 0;
  let stars = 0;
  if(pct>=0.9) stars=3; else if(pct>=0.7) stars=2; else if(pct>=0.4) stars=1;
  
  const lvl = state.currentLevel;
  const p = state.progress[lvl];
  
  // Update game-specific progress
  if(!p[game] || stars>p[game].best) p[game] = {best:stars, correct, total};
  
  // Update total stars based on completed games
  p.stars = (p.quiz?1:0) + (p.match?1:0) + (p.scramble?1:0) + (p.hunt?1:0);

  const gameNames = {quiz:'Quiz', match:'Eşleştirme', scramble:'Karışık Harfler', hunt: 'Kelime Avı'};
  const nextLevel = lvl+1;
  const hasNext = nextLevel<=TOTAL_LEVELS;

  openOverlay(`
    <div class="overlay-header">
      <button class="icon-btn" data-action="close-overlay">✕</button>
      <div class="overlay-title">Sonuç</div>
      <div style="width:38px;"></div>
    </div>
    <div class="overlay-body result-wrap">
      <div class="result-stars pop">${starsToStr(stars)}</div>
      <div class="result-title">${stars>=2 ? 'Harika iş! 🎉' : stars===1 ? 'İyi başlangıç! 👍' : 'Tekrar dene! 💪'}</div>
      <div class="result-sub">${gameNames[game]} tamamlandı!</div>
      <div class="result-stat-row">
        <div class="result-stat"><div class="rs-num">${correct}/${total}</div><div class="rs-label">doğru</div></div>
        <div class="result-stat"><div class="rs-num">${Math.round(pct*100)}%</div><div class="rs-label">başarı</div></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary btn-block" data-action="retry-game" data-game="${game}">🔁 Tekrar Oyna</button>
        <button class="btn btn-secondary btn-block" data-action="show-game-select">🎮 Diğer Oyunlar</button>
        ${hasNext && isUnlocked(nextLevel) ? `<button class="btn btn-secondary btn-block" data-action="open-level" data-level="${nextLevel}">➡️ Sonraki Ada</button>` : ''}
        <button class="btn btn-secondary btn-block" data-action="close-overlay">🗺️ Haritaya Dön</button>
      </div>
    </div>
  `);
}
function isUnlockedAfterThis(lvl){ return state.progress[lvl].stars>=1; }

/* ---------------- EVENT DELEGATION ---------------- */
document.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  switch(action){
    case 'open-level': closeOverlayInstant(); openLevel(parseInt(t.dataset.level)); break;
    case 'close-overlay': closeOverlay(); break;
    case 'flip-card': flipCard(); break;
    case 'flash-prev': flashPrev(); break;
    case 'flash-next': flashNext(); break;
    case 'start-game': startGame(t.dataset.game); break;
    case 'quiz-answer': quizAnswer(decodeURIComponent(t.dataset.opt)); break;
    case 'match-flip': matchFlip(t.dataset.id); break;
    case 'scr-tile': scrTile(parseInt(t.dataset.idx)); break;
    case 'scr-undo': scrUndo(); break;
    case 'scr-clear': scrClear(); break;
    case 'retry-game': startGame(t.dataset.game); break;
    case 'show-game-select': showGameSelect(); break;
  }
});
function closeOverlayInstant(){
  const el = document.getElementById('overlayRoot');
  if(el) el.style.display='none';
}

/* ---------------- INIT ---------------- */
render();
