<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>İsoing 1.5 - İngilizce Öğren</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-menu: rgba(10, 10, 30, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --gold: #ffd700;
            --gold-gradient: linear-gradient(135deg, #f7971e, #ffd200);
            --radius: 20px;
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #e4e6eb;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-menu: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            background: var(--bg-secondary);
            border-radius: 0;
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: none;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            min-height: 56px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-stats {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }
        .header-stats span { display: flex; align-items: center; gap: 3px; }
        .header-stats .xp { color: #ffd700; }
        .header-stats .coin { color: #ff9800; }
        .header-stats .lives { color: #ff6b6b; }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 80px;
            -webkit-overflow-scrolling: touch;
        }

        /* GAME GRID */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 4px 0;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            min-height: 110px;
            justify-content: center;
        }
        .game-card:active { transform: scale(0.95); }
        .game-card .icon { font-size: 32px; }
        .game-card .gname { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .game-card .gdesc { font-size: 11px; color: var(--text-secondary); }
        .game-card.locked { opacity: 0.5; pointer-events: none; }

        /* GAME AREA (oyun ekranı) */
        .game-area {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 16px;
            min-height: 340px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-area h2 { font-size: 22px; margin-bottom: 10px; font-weight: 600; }
        .game-area p { color: var(--text-secondary); font-size: 14px; max-width: 100%; line-height: 1.6; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-menu);
            border-top: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 6px 0 env(safe-area-inset-bottom);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 0;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 10px;
            transition: 0.2s;
            font-weight: 500;
        }
        .bottom-nav .nav-item .nav-icon { font-size: 22px; }
        .bottom-nav .nav-item.active { color: var(--gold); }
        .bottom-nav .nav-item:active { transform: scale(0.9); }

        /* OYUN İÇİ ELEMANLAR */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 400px;
            margin: 8px 0;
        }
        .card {
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #3a3a5c, #2a2a44);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--border-color);
            text-align: center;
            padding: 4px;
            word-break: break-word;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        [data-theme="light"] .card { background: linear-gradient(145deg, #e0e0e0, #c8c8c8); color: #1a1a2e; }
        .card.flipped { background: linear-gradient(145deg, #4fc3f7, #2196f3); border-color: #4fc3f7; transform: scale(0.95); }
        .card.matched { background: linear-gradient(145deg, #66bb6a, #388e3c); border-color: #66bb6a; cursor: default; opacity: 0.7; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin: 8px 0;
        }
        .option-btn {
            padding: 14px 10px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.correct { background: #2e7d32; border-color: #66bb6a; }
        .option-btn.wrong { background: #c62828; border-color: #ef5350; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.5; }

        .question-text {
            font-size: 18px;
            margin: 10px 0 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 16px;
            border-left: 4px solid var(--gold);
            width: 100%;
            max-width: 100%;
        }
        .question-text .blank {
            display: inline-block;
            min-width: 70px;
            border-bottom: 3px dashed var(--gold);
            color: var(--gold);
            font-weight: 700;
            padding: 0 4px;
        }

        .btn-primary {
            background: var(--gold-gradient);
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
            box-shadow: 0 4px 20px rgba(255,215,0,0.2);
        }
        .btn-primary:active { transform: scale(0.95); }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        .btn-secondary:active { transform: scale(0.95); }

        .feedback {
            margin: 10px 0;
            font-size: 17px;
            font-weight: 600;
            min-height: 30px;
        }
        .feedback.correct { color: #66bb6a; }
        .feedback.wrong { color: #ef5350; }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gold-gradient);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .text-input {
            padding: 12px 16px;
            border-radius: 50px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            outline: none;
        }
        .text-input:focus { border-color: var(--gold); }

        .speak-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 50%;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .speak-btn:active { transform: scale(0.8); }

        .mic-btn {
            background: var(--gold-gradient);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: #1a1a2e;
            margin: 8px 0;
        }
        .mic-btn:active { transform: scale(0.9); }
        .mic-btn.listening { animation: pulse 0.8s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,215,0,0.4); }
        }

        .badge-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 8px 0;
        }
        .badge {
            background: rgba(255,215,0,0.1);
            border: 1px solid var(--gold);
            border-radius: 50px;
            padding: 3px 12px;
            font-size: 12px;
            color: var(--gold);
        }
        .badge.unlocked { background: rgba(255,215,0,0.15); }
        .badge.locked { opacity: 0.3; }

        /* STATS */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            width: 100%;
            max-width: 100%;
        }
        .stat-row .label { color: var(--text-secondary); }
        .stat-row .value { font-weight: 600; }

        /* SCROLL */
        .main-content::-webkit-scrollbar { width: 3px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CONFETTI */
        .confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            top: -10px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* RESPONSIVE */
        @media (max-width: 420px) {
            .game-grid { gap: 8px; }
            .game-card { padding: 14px 8px; min-height: 90px; }
            .game-card .icon { font-size: 26px; }
            .game-card .gname { font-size: 12px; }
            .header-stats { font-size: 11px; gap: 8px; }
            .logo h1 { font-size: 17px; }
            .card-grid { grid-template-columns: repeat(3, 1fr); }
            .options-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 360px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* BACK BUTTON */
        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .back-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo"><h1>📚 İsoing</h1></div>
        <div class="header-right">
            <div class="header-stats">
                <span class="xp">⚡<span id="xpDisplay">0</span></span>

        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <!-- Dinamik içerik buraya gelecek -->
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home">

        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span>Profil</span>
        </button>
    </div>
</div>

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getRandomWords(count, level = state.level) {
    const start = (level - 1) * 50;
    const end = Math.min(start + 50, WORD_POOL.length);
    const pool = WORD_POOL.slice(start, end);
    if (pool.length === 0) return shuffleArray([...WORD_POOL]).slice(0, count);
    const shuffled = shuffleArray([...pool]);
    return shuffled.slice(0, Math.min(count, shuffled.length));
}

function speak(text) {
    if (!window.speechSynthesis) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}

function showConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcb', '#ff9f43'];
    for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 6 + 3) + 'px';
        el.style.height = (Math.random() * 6 + 3) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        el.style.animationDelay = (Math.random() * 0.6) + 's';
        container.appendChild(el);
    }
    document.body.appendChild(container);
    setTimeout(() => container.remove(), 3000);
}

function vibrate(duration = 80) {
    if (navigator.vibrate) navigator.vibrate(duration);
}

function addXP(amount) {
    state.xp += amount;
    const newLevel = Math.floor(state.xp / 100) + 1;
    if (newLevel > state.level) {
        state.level = newLevel;
        checkBadges();
    }
    updateUI();
    saveState();
}

function addCoins(amount) {
    state.coins += amount;
    updateUI();
    saveState();
}

function addCorrect() {
    state.totalCorrect++;
    updateUI();
    saveState();
}

function addWrong(word) {
    state.totalWrong++;
    const existing = state.wrongWords.find(w => w.en === word.en);
    if (existing) {
        existing.count = (existing.count || 1) + 1;
    } else {
        state.wrongWords.push({ ...word, count: 1 });
    }
    updateUI();
    saveState();
}

function checkBadges() {
    const badges = [];
    if (state.totalCorrect >= 100) badges.push('🏅 100 Kelime');
    if (state.totalCorrect >= 500) badges.push('🥈 500 Kelime');
    if (state.totalCorrect >= 1000) badges.push('🥇 1000 Kelime');
    if (state.streak >= 7) badges.push('🔥 7 Gün Seri');
    if (state.streak >= 30) badges.push('🌟 30 Gün Seri');
    if (state.level >= 5) badges.push('👑 A1 Yarısı');
    if (state.level >= 10) badges.push('👑 A1 Tamamlandı');
    if (state.totalCorrect >= 10 && state.totalWrong === 0) badges.push('🎯 Hatasız 10');
    state.badges = [...new Set(badges)];
    saveState();
}

function updateUI() {
    document.getElementById('xpDisplay').textContent = state.xp;
    document.getElementById('coinDisplay').textContent = state.coins;
    document.getElementById('livesDisplay').textContent = state.lives;
}

function saveState() {
    try {
        localStorage.setItem('isoing15', JSON.stringify(state));
    } catch(e) {}
}

function loadState() {
    try {
        const data = localStorage.getItem('isoing15');
        if (data) {
            const parsed = JSON.parse(data);
            Object.assign(state, parsed);
            if (state.lastPlayDate) {
                const last = new Date(state.lastPlayDate);
                const today = new Date();
                const diff = (today - last) / (1000 * 60 * 60 * 24);
                if (diff > 1 && diff < 2) {
                    state.streak++;
                    addXP(50);
                } else if (diff >= 2) {
                    state.streak = 0;
                }
            }
            state.lastPlayDate = new Date().toISOString();
            updateUI();
            checkBadges();
        }
    } catch(e) {}
}

function getExampleSentences(word) {
    const templates = [
        `I see a ___ in the garden.`,
        `She has a ___ at home.`,
        `The ___ is very nice.`,
        `I like this ___ very much.`,
        `My friend has a ___.`,
        `We need a ___ now.`,
        `The ___ is on the table.`,
        `This ___ is beautiful.`,
        `He bought a ___.`,
        `They found a ___.`
    ];
    const sentence = templates[Math.floor(Math.random() * templates.length)].replace('___', word);
    return [
        sentence,
        `"${word}" is a common word.`,
        `I learned "${word}" today.`
    ];
}

function renderReview() {

function showReviewQuestion() {
    const { words, index } = gameVars.review;
    if (index >= words.length || !state.gameActive) {
        state.gameActive = false;
        renderReviewComplete();
        return;
    }
    const word = words[index];
    const pool = getRandomWords(10);
    let options = [word.tr];
    pool.forEach(w => {
        if (w.tr !== word.tr && !options.includes(w.tr) && options.length < 4) {

        }
    });

    gameVars.review.current = { word, options, correct: word.tr };

    html += `<p style="font-size:24px;font-weight:700;margin:12px 0;">${word.en}</p>`;

    html += `<div class="options-grid">`;

        html += `<button class="option-btn" data-value="${opt}">${opt}</button>`;

    html += `<div class="progress-bar"><div class="progress-fill" style="width:${(index/words.length)*100}%"></div></div>`;
    html += `<p style="color:var(--text-secondary);font-size:13px;">${index+1}/${words.length}</p>`;
    html += `<button class="btn-secondary" onclick="goToPage('home')">🔙 Geri</button>`;

    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', onReviewAnswer);
    });

}

function onReviewAnswer(e) {
    if (!state.gameActive) return;
    const btn = e.currentTarget;
    const selected = btn.dataset.value;
    const { current, words, index } = gameVars.review;
    const fb = document.getElementById('reviewFeedback');
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    if (selected === current.correct) {
        btn.classList.add('correct');
        fb.textContent = '✅ Doğru! +25 XP, +20🪙';
        fb.className = 'feedback correct';
        addXP(25); addCoins(20); addCorrect();
        showConfetti();
        state.wrongWords = state.wrongWords.filter(w => w.en !== current.word.en);
        saveState();
    } else {
        btn.classList.add('wrong');
        fb.textContent = `❌ Doğru: ${current.correct}`;
        fb.className = 'feedback wrong';
        vibrate();
        state.lives--;
        updateUI();

            state.gameActive = false;
            setTimeout(() => { renderGameOver(); }, 500);

    gameVars.review.index++;

}

function renderReviewComplete() {

function startGame(gameId) {
    state.gameActive = true;
    state.lives = 3;
    updateUI();
    switch(gameId) {
        case 'match': initMatch(); break;
        case 'quiz': initQuiz(); break;

// 5.1 KART EŞLEŞTİR
function initMatch() {
    const words = getRandomWords(8);
    const pairs = [];
    words.forEach(w => {
        pairs.push({ id: w.en + '_en', text: w.en, pairId: w.en, type: 'en' });
        pairs.push({ id: w.tr + '_tr', text: w.tr, pairId: w.en, type: 'tr' });
    });
    gameVars.match = { cards: shuffleArray(pairs), flipped: [], matched: [], locked: false };
    renderMatch();
}

function renderMatch() {
    const { cards, matched } = gameVars.match;
    let html = `<h2>🧠 Kart Eşleştir</h2><p style="font-size:13px;color:var(--text-secondary);">İngilizce-Türkçe eşleştir</p>`;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${(matched.length/cards.length)*100}%"></div></div>`;
    html += `<div class="card-grid">`;
    cards.forEach((card, i) => {
        const isFlipped = gameVars.match.flipped.includes(i);
        const isMatched = matched.includes(i);
        const content = isFlipped || isMatched ? card.text : '❓';
        let cls = 'card';
        if (isFlipped) cls += ' flipped';
        if (isMatched) cls += ' matched';
        html += `<div class="${cls}" data-index="${i}" data-pair="${card.pairId}" data-type="${card.type}">${content}</div>`;
    });
    html += `</div><div class="feedback" id="matchFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initMatch()">🔄 Yeni</button>`;
    html += `<button class="speak-btn" onclick="speak('${cards.find(c=>c.type==='en')?.text||'hello'}')">🔊</button>`;
    html += `<button class="btn-secondary" onclick="goToPage('home')">🔙 Geri</button>`;
    mainContent.innerHTML = html;
    document.querySelectorAll('.card').forEach(el => el.addEventListener('click', onMatchClick));
}

function onMatchClick(e) {
    if (!state.gameActive) return;
    const card = e.currentTarget;
    const idx = parseInt(card.dataset.index);
    const { flipped, matched, cards, locked } = gameVars.match;
    if (locked || flipped.includes(idx) || matched.includes(idx) || flipped.length >= 2) return;
    gameVars.match.flipped.push(idx);
    card.classList.add('flipped');
    card.textContent = cards[idx].text;
    if (gameVars.match.flipped.length === 2) {
        gameVars.match.locked = true;
        const idx1 = gameVars.match.flipped[0];
        const idx2 = gameVars.match.flipped[1];
        const c1 = cards[idx1], c2 = cards[idx2];
        const fb = document.getElementById('matchFeedback');
        if (c1.pairId === c2.pairId && c1.type !== c2.type) {
            gameVars.match.matched.push(idx1, idx2);
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].classList.add('matched');
                document.querySelectorAll('.card')[idx2].classList.add('matched');
                fb.textContent = '✅ +15 XP, +20🪙';
                fb.className = 'feedback correct';
                addXP(15); addCoins(20); addCorrect();
                speak(c1.type === 'en' ? c1.text : c2.text);
                showConfetti();
                gameVars.match.flipped = [];
                gameVars.match.locked = false;
                const progress = (gameVars.match.matched.length / cards.length) * 100;
                document.querySelector('.progress-fill').style.width = progress + '%';
                if (gameVars.match.matched.length === cards.length) {
                    state.gameActive = false;
                    setTimeout(() => renderLevelComplete(), 600);
                }
            }, 500);
        } else {
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].classList.remove('flipped');
                document.querySelectorAll('.card')[idx2].classList.remove('flipped');
                document.querySelectorAll('.card')[idx1].textContent = '❓';
                document.querySelectorAll('.card')[idx2].textContent = '❓';
                fb.textContent = '❌ -1 can';
                fb.className = 'feedback wrong';
                state.lives--;
                vibrate();
                addWrong(c1.type === 'en' ? c1 : c2);
                updateUI();
                gameVars.match.flipped = [];
                gameVars.match.locked = false;
                if (state.lives <= 0) {
                    state.gameActive = false;
                    setTimeout(() => renderGameOver(), 400);
                }
            }, 700);
        }
    }
}

// 5.4 ADAM ASMACA
function initHangman() {
    const word = getRandomWords(1)[0];
    gameVars.hangman = { word: word.en.toLowerCase(), tr: word.tr, guessed: [], wrong: 0, maxWrong: 6 };
    state.gameActive = true;
    renderHangman();
}

function renderHangman() {
    const { word, tr, guessed, wrong, maxWrong } = gameVars.hangman;
    const display = word.split('').map(l => guessed.includes(l) ? l : '_').join(' ');
    const remaining = word.split('').filter(l => !guessed.includes(l)).length;
    let html = `<h2>🪢 Adam Asmaca</h2><p style="font-size:24px;font-family:monospace;letter-spacing:4px;">${display}</p>`;
    html += `<p>Yanlış: ${'❤️'.repeat(Math.max(0, maxWrong - wrong))} ${'💔'.repeat(wrong)}</p>`;
    html += `<p style="color:var(--text-secondary);font-size:14px;">İpucu: ${tr}</p>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px;margin:8px 0;">`;
    'abcdefghijklmnopqrstuvwxyz'.split('').forEach(l => {
        const disabled = guessed.includes(l) || wrong >= maxWrong || remaining === 0;
        html += `<button class="option-btn" data-letter="${l}" ${disabled ? 'disabled' : ''} style="min-width:32px;padding:6px 10px;font-size:14px;">${l}</button>`;
    });
    html += `</div><div class="feedback" id="hangmanFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initHangman()">🔄 Yeni</button>`;
    html += `<button class="speak-btn" onclick="speak('${word}')">🔊</button>`;
    html += `<button class="btn-secondary" onclick="goToPage('home')">🔙 Geri</button>`;
    mainContent.innerHTML = html;
    document.querySelectorAll('[data-letter]').forEach(btn => btn.addEventListener('click', onHangmanGuess));
}

function onHangmanGuess(e) {
    if (!state.gameActive) return;
    const btn = e.currentTarget;
    const letter = btn.dataset.letter;
    const { word, guessed, wrong, maxWrong, tr } = gameVars.hangman;
    if (guessed.includes(letter)) return;
    guessed.push(letter);
    if (word.includes(letter)) {
        btn.classList.add('correct');
        const remaining = word.split('').filter(l => !guessed.includes(l)).length;
        if (remaining === 0) {
            addXP(30); addCoins(30); addCorrect();
            showConfetti();
            document.getElementById('hangmanFeedback').textContent = '🎉 Tebrikler! +30 XP, +30🪙';
            document.getElementById('hangmanFeedback').className = 'feedback correct';
            state.gameActive = false;
            setTimeout(renderLevelComplete, 1000);
        } else {
            document.getElementById('hangmanFeedback').textContent = '✅ Doğru harf!';
            document.getElementById('hangmanFeedback').className = 'feedback correct';
        }
    } else {
        gameVars.hangman.wrong++;
        btn.classList.add('wrong');
        vibrate();
        document.getElementById('hangmanFeedback').textContent = `❌ Yanlış! (${gameVars.hangman.wrong}/${maxWrong})`;
        document.getElementById('hangmanFeedback').className = 'feedback wrong';
        if (gameVars.hangman.wrong >= maxWrong) {
            state.gameActive = false;
            addWrong({ en: word, tr: tr });
            document.getElementById('hangmanFeedback').textContent = `💀 Kelime: ${word}`;
            setTimeout(renderGameOver, 800);
            return;
        }
    }
    renderHangman();
}

// 5.6 HIZLI CEVAP
function initSpeed() {
    const words = getRandomWords(20);
    gameVars.speed = { words: shuffleArray(words), index: 0, time: 30, timer: null };
    state.gameActive = true;
    showSpeed();
}

function showSpeed() {
    const { words, index, time } = gameVars.speed;
    if (index >= words.length || time <= 0) {
        clearInterval(gameVars.speed.timer);
        state.gameActive = false;
        renderLevelComplete();
        return;
    }
    const word = words[index];
    const pool = getRandomWords(10);
    let options = [word.tr];
    pool.forEach(w => { if (w.tr !== word.tr && !options.includes(w.tr) && options.length < 4) options.push(w.tr); });
    options = shuffleArray(options);
    gameVars.speed.current = { word, options, correct: word.tr };
    let html = `<h2>⚡ Hızlı Cevap</h2><p style="font-size:20px;">⏱️ ${time}s</p>`;
    html += `<p style="font-size:24px;font-weight:700;">${word.en}</p>`;
    html += `<div class="options-grid">`;
    options.forEach(opt => { html += `<button class="option-btn" data-value="${opt}">${opt}</button>`; });
    html += `</div><div class="feedback" id="speedFeedback"></div>`;
    html += `<p style="color:var(--text-secondary);font-size:13px;">${index+1}/${words.length}</p>`;
    mainContent.innerHTML = html;
    document.querySelectorAll('.option-btn').forEach(btn => btn.addEventListener('click', onSpeedAnswer));
    if (!gameVars.speed.timer) {
        gameVars.speed.timer = setInterval(() => {
            gameVars.speed.time--;
            if (gameVars.speed.time <= 0) {
                clearInterval(gameVars.speed.timer);
                state.gameActive = false;
                renderLevelComplete();
            } else {
                const timeEl = document.querySelector('p[style*="font-size:20px"]');
                if (timeEl) timeEl.textContent = `⏱️ ${gameVars.speed.time}s`;
            }
        }, 1000);
    }
    speak(word.en);
}

function onSpeedAnswer(e) {
    if (!state.gameActive) return;
    const btn = e.currentTarget;
    const selected = btn.dataset.value;
    const { current, words, index } = gameVars.speed;
    const fb = document.getElementById('speedFeedback');
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    if (selected === current.correct) {
        btn.classList.add('correct');
        fb.textContent = '✅ +15 XP, +15🪙';
        fb.className = 'feedback correct';
        addXP(15); addCoins(15); addCorrect();
        showConfetti();
    } else {
        btn.classList.add('wrong');
        fb.textContent = `❌ Doğru: ${current.correct}`;
        fb.className = 'feedback wrong';
        vibrate();
        addWrong(current.word);
        state.lives--;
        updateUI();
        document.querySelectorAll('.option-btn').forEach(b => {
            if (b.dataset.value === current.correct) b.classList.add('correct');
        });
        if (state.lives <= 0) { state.gameActive = false; clearInterval(gameVars.speed.timer); setTimeout(renderGameOver, 500); return; }
    }
    gameVars.speed.index++;
    setTimeout(() => { if (state.gameActive) showSpeed(); }, 800);
}

// 5.8 DİYALOG
function initDialogue() {
    const word = getRandomWords(1)[0];
    const dialogues = [
        { q: `What is this?`, a: `This is a ___` },
        { q: `Do you have a ___?`, a: `Yes, I have a ___` },
        { q: `Where is the ___?`, a: `The ___ is here` },
    ];
    const d = dialogues[Math.floor(Math.random() * dialogues.length)];
    const correctAnswer = d.a.replace('___', word.en);
    gameVars.dialogue = { word, question: d.q, correctAnswer };
    state.gameActive = true;
    renderDialogue();
}

function renderDialogue() {
    const { word, question, correctAnswer } = gameVars.dialogue;
    let html = `<h2>💬 Diyalog</h2>`;
    html += `<div style="background:var(--bg-card);border-radius:16px;padding:16px;max-width:100%;margin:10px 0;border:1px solid var(--border-color);">`;
    html += `<p style="font-size:17px;">🧑: ${question}</p>`;
    html += `<p style="font-size:17px;margin-top:10px;">👤: <input class="text-input" id="dialogueInput" placeholder="Cevabını yaz..." style="max-width:100%;"></p>`;
    html += `</div>`;
    html += `<button class="btn-primary" onclick="checkDialogue()">✅ Kontrol Et</button>`;
    html += `<div class="feedback" id="dialogueFeedback"></div>`;
    html += `<button class="speak-btn" onclick="speak('${correctAnswer}')">🔊</button>`;
    html += `<button class="btn-secondary" onclick="initDialogue()">🔄 Yeni</button>`;
    html += `<button class="btn-secondary" onclick="goToPage('home')">🔙 Geri</button>`;
    mainContent.innerHTML = html;
    document.getElementById('dialogueInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkDialogue();
    });
    speak(question);
}

function checkDialogue() {
    if (!state.gameActive) return;
    const input = document.getElementById('dialogueInput');
    const { correctAnswer, word } = gameVars.dialogue;
    const fb = document.getElementById('dialogueFeedback');
    if (input.value.trim().toLowerCase() === correctAnswer.toLowerCase()) {
        fb.textContent = '✅ +25 XP, +25🪙';
        fb.className = 'feedback correct';
        addXP(25); addCoins(25); addCorrect();
        showConfetti();
        state.gameActive = false;
        setTimeout(renderLevelComplete, 1000);
    } else {
        fb.textContent = `❌ Doğru: "${correctAnswer}"`;
        fb.className = 'feedback wrong';
        vibrate();
        addWrong({ en: word.en, tr: word.tr });
        state.lives--;
        updateUI();
        if (state.lives <= 0) { state.gameActive = false; setTimeout(renderGameOver, 500); }
    }
}

// 5.9 TELAFFUZ TESTİ
function initSpeak() {
    const word = getRandomWords(1)[0];
    gameVars.speak = { word: word.en, tr: word.tr };
    state.gameActive = true;
    renderSpeak();
}

function renderSpeak() {
    const { word, tr } = gameVars.speak;
    let html = `<h2>🎤 Telaffuz Testi</h2>`;
    html += `<p style="font-size:28px;font-weight:700;">${word}</p>`;
    html += `<button class="speak-btn" onclick="speak('${word}')">🔊 Dinle</button>`;
    html += `<p style="color:var(--text-secondary);">${tr}</p>`;
    html += `<button class="mic-btn" id="micBtn" onclick="startListening()">🎤</button>`;
    html += `<div class="feedback" id="speakFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initSpeak()">🔄 Yeni</button>`;
    html += `<button class="btn-secondary" onclick="goToPage('home')">🔙 Geri</button>`;
    mainContent.innerHTML = html;
}

function startListening() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        document.getElementById('speakFeedback').textContent = '❌ Chrome kullan.';
        return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '🔴';
    document.getElementById('speakFeedback').textContent = '🎤 Dinleniyor...';
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        const { word } = gameVars.speak;
        const fb = document.getElementById('speakFeedback');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        if (transcript === word.toLowerCase()) {
            fb.textContent = `✅ Doğru! +25 XP, +25🪙`;
            fb.className = 'feedback correct';
            addXP(25); addCoins(25); addCorrect();
            showConfetti();
            state.gameActive = false;
            setTimeout(renderLevelComplete, 1000);
        } else {
            fb.textContent = `❌ Sen: "${transcript}" | Doğru: "${word}"`;
            fb.className = 'feedback wrong';
            vibrate();
            addWrong({ en: word, tr: 'telaffuz' });
            state.lives--;
            updateUI();
            if (state.lives <= 0) { state.gameActive = false; setTimeout(renderGameOver, 500); }
        }
    };
    recognition.onerror = (e) => {
        const fb = document.getElementById('speakFeedback');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        fb.textContent = `❌ Hata: ${e.error}`;
        fb.className = 'feedback wrong';
    };
    recognition.start();
}

// 6. EKRAN YÖNETİMİ
// ============================================================

function renderLevelComplete() {
    const total = state.totalCorrect + state.totalWrong;
    const rate = total > 0 ? Math.round((state.totalCorrect / total) * 100) : 0;
    let grade = '⭐';
    let bonus = 0;
    if (rate >= 90) { grade = '⭐⭐⭐ Perfect!'; bonus = 50; }
    else if (rate >= 70) { grade = '⭐⭐ Good!'; bonus = 30; }
    else { grade = '⭐ Fair!'; bonus = 10; }
    addXP(bonus);
    addCoins(bonus);
    checkBadges();
    saveState();
    let html = `<h2>🏆 Seviye Tamamlandı!</h2>`;
    html += `<p style="font-size:22px;">${grade}</p>`;
    html += `<p>Başarı: ${rate}% | +${bonus} XP Bonus | +${bonus}🪙</p>`;
    html += `<div class="badge-container">`;
    state.badges.forEach(b => { html += `<span class="badge unlocked">${b}</span>`; });
    html += `</div>`;
    html += `<button class="btn-primary" onclick="goToPage('home')">🏠 Ana Sayfa</button>`;
    mainContent.innerHTML = html;
    showConfetti();
    updateUI();
}

function renderGameOver() {
    saveState();
    let html = `<h2>💔 Oyun Bitti!</h2>`;
    html += `<p>Seviye ${state.level} · XP: ${state.xp}</p>`;
    html += `<p>Doğru: ${state.totalCorrect} | Yanlış: ${state.totalWrong}</p>`;
    html += `<button class="btn-primary" onclick="goToPage('home')">🏠 Ana Sayfa</button>`;
    html += `<button class="btn-secondary" onclick="goToPage('stats')">📊 İstatistik</button>`;
    mainContent.innerHTML = html;
}
